spring.application.name=PathSTU

# Database Configuration (defaults to local H2 for development)
# To use PostgreSQL, set env vars: DB_URL, DB_USERNAME, DB_PASSWORD, DB_DRIVER, JPA_DIALECT
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/pathstu;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# JWT Configuration
app.jwt.secret=cGF0aFNUVVNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjEyMzQ1Njc4OTA=
app.jwt.expiration=86400000

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=1001500582199-7dcuveamrvn59hh0795lp9p5aj19k3s6.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=your-google-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

# Server Port
server.port=8080

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Groq API Configuration
app.groq.api-key=${GROQ_API_KEY:}
app.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
app.groq.api-url=https://api.groq.com/openai/v1/chat/completions
